<aside class="llm-sidebar" data-llm-sidebar>
  <button
    type="button"
    class="llm-sidebar-toggle"
    data-llm-sidebar-toggle
    aria-expanded="false"
    aria-controls="llm-sidebar-panel"
  >
    <span class="llm-sidebar-toggle-icon">✦</span>
    <span class="llm-sidebar-toggle-text">LLM</span>
  </button>

  <div class="llm-sidebar-panel" id="llm-sidebar-panel" data-llm-sidebar-panel>
    <div class="llm-sidebar-header">
      <div>
        <p class="llm-sidebar-eyebrow">Assistant tools</p>
        <h2 class="llm-sidebar-title">LLM Panel</h2>
      </div>
      <button
        type="button"
        class="llm-sidebar-close"
        data-llm-sidebar-close
        aria-label="Close LLM sidebar"
      >
        <svg class="llm-sidebar-close-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M4 4L12 12"></path>
          <path d="M12 4L4 12"></path>
        </svg>
      </button>
    </div>

    <div class="llm-sidebar-mode-list" role="tablist" aria-label="LLM modes">
      <button type="button" class="llm-sidebar-mode is-active" data-llm-mode="ask">Ask</button>
      <button type="button" class="llm-sidebar-mode" data-llm-mode="highlight">Highlight</button>
      <button type="button" class="llm-sidebar-mode" data-llm-mode="feedback">Feedback</button>
    </div>

    <div class="llm-notice is-hidden" data-llm-notice role="status" aria-live="polite"></div>

    <div class="llm-sidebar-body">
    <section class="llm-section is-active" data-llm-section="ask">
      <label class="llm-label" for="llm-free-query">Ask with retrieved context</label>
      <textarea
        id="llm-free-query"
        class="llm-textarea"
        rows="6"
        placeholder="Ask a question about the currently retrieved top results..."
      ></textarea>

      <div class="llm-inline-row">
        <label class="llm-small-label" for="llm-top-k">Use top-k</label>
        <div class="mode-picker llm-k-picker" data-k-picker>
          <input type="hidden" id="llm-top-k" value="5" />
          <button
            class="mode-picker-trigger"
            type="button"
            data-k-trigger
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            <span class="mode-picker-text" data-k-label>Top 5</span>
            <span class="mode-picker-chevron" aria-hidden="true"></span>
          </button>

          <div class="mode-picker-menu" role="listbox" aria-label="Top-k for ask mode" data-k-menu>
            <button type="button" class="mode-picker-option is-active" data-k-option="5">
              <span class="mode-picker-option-title">Top 5</span>
              <span class="mode-picker-option-subtitle">Faster response</span>
            </button>
            <button type="button" class="mode-picker-option" data-k-option="10">
              <span class="mode-picker-option-title">Top 10</span>
              <span class="mode-picker-option-subtitle">Balanced context</span>
            </button>
            <button type="button" class="mode-picker-option" data-k-option="20">
              <span class="mode-picker-option-title">Top 20</span>
              <span class="mode-picker-option-subtitle">Maximum recall</span>
            </button>
          </div>
        </div>
      </div>

      <button type="button" class="llm-action-button" data-llm-ask-button>
        Run RAG Query
      </button>

      <div class="llm-answer-block" data-llm-answer-block hidden>
        <p class="llm-answer-title">Answer</p>
        <div class="llm-answer-text" data-llm-answer-text></div>
      </div>
    </section>

      <section class="llm-section" data-llm-section="highlight">
        <p class="llm-section-text">
          Extract the most relevant spans from the current results and highlight them.
        </p>

        <div class="llm-inline-row">
          <label class="llm-small-label" for="llm-highlight-k">Use top-k</label>
          <div class="mode-picker llm-k-picker" data-k-picker>
            <input type="hidden" id="llm-highlight-k" value="5" />
            <button
              class="mode-picker-trigger"
              type="button"
              data-k-trigger
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="mode-picker-text" data-k-label>Top 5</span>
              <span class="mode-picker-chevron" aria-hidden="true"></span>
            </button>

            <div class="mode-picker-menu" role="listbox" aria-label="Top-k for highlight mode" data-k-menu>
              <button type="button" class="mode-picker-option is-active" data-k-option="5">
                <span class="mode-picker-option-title">Top 5</span>
                <span class="mode-picker-option-subtitle">Faster extraction</span>
              </button>
              <button type="button" class="mode-picker-option" data-k-option="10">
                <span class="mode-picker-option-title">Top 10</span>
                <span class="mode-picker-option-subtitle">Balanced context</span>
              </button>
              <button type="button" class="mode-picker-option" data-k-option="20">
                <span class="mode-picker-option-title">Top 20</span>
                <span class="mode-picker-option-subtitle">Maximum recall</span>
              </button>
            </div>
          </div>
        </div>

        <button type="button" class="llm-action-button" data-llm-highlight-button>
          Extract Highlights
        </button>
      </section>

      <section class="llm-section" data-llm-section="feedback">
        <p class="llm-section-text">
          Quickly evaluate the current retrieval output.
        </p>

        <div class="llm-inline-row">
          <label class="llm-small-label" for="llm-feedback-k">Use top-k</label>
          <div class="mode-picker llm-k-picker" data-k-picker>
            <input type="hidden" id="llm-feedback-k" value="10" />
            <button
              class="mode-picker-trigger"
              type="button"
              data-k-trigger
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="mode-picker-text" data-k-label>Top 10</span>
              <span class="mode-picker-chevron" aria-hidden="true"></span>
            </button>

            <div class="mode-picker-menu" role="listbox" aria-label="Top-k for feedback mode" data-k-menu>
              <button type="button" class="mode-picker-option is-active" data-k-option="10">
                <span class="mode-picker-option-title">Top 10</span>
                <span class="mode-picker-option-subtitle">Balanced scoring</span>
              </button>
              <button type="button" class="mode-picker-option" data-k-option="20">
                <span class="mode-picker-option-title">Top 20</span>
                <span class="mode-picker-option-subtitle">Wider evaluation</span>
              </button>
            </div>
          </div>
        </div>

        <button type="button" class="llm-action-button" data-llm-feedback-button>
          Score Results
        </button>

        <button type="button" class="llm-action-button" data-save-feedback-button>
          Save Feedback
        </button>
      </section>
    </div>

    <div class="llm-sidebar-footer">
      <p class="llm-placeholder-note">
        Feedback labels can be scored and exported.
      </p>
    </div>
  </div>
</aside>
