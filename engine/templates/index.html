{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <main class="container">
    <h1>Search</h1>

    <form
      hx-get="/search"
      hx-target="#results"
      hx-swap="innerHTML"
      hx-push-url="true">
      <input
        type="text"
        name="q"
        value="{{ q|default:'' }}"
        placeholder="Search..."
        autocomplete="off"
        hx-get="/search"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#results"
        hx-swap="innerHTML"
        hx-push-url="true"
      />
    </form>

    <section id="results">
      {% include "partials/results.html" %}
    </section>
  </main>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
